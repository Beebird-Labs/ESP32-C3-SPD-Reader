name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  esp-idf:
    name: ESP-IDF
    runs-on: ubuntu-latest
    container: espressif/idf:v6.0.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py build
          idf.py size

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32c3-speedometer-reader
          path: |
            build/*.bin
            build/*.elf
            build/*.map
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
          if-no-files-found: error

      - name: Attach firmware to release
        if: github.event_name == 'release'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPLOAD_URL=$(curl -sf \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/${{ github.ref_name }}" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['upload_url'].split('{')[0])")
          curl -sf \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @build/ESP32-C3-SPD-Reader.bin \
            "${UPLOAD_URL}?name=ESP32-C3-SPD-Reader.bin"
